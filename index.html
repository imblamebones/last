<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="5 Bento Grid Layouts">
    <title>Bento Grids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bento Grids</h1>
        <p>Макеты (5 сверху, 1 снизу)</p>
    </header>
    
    <main class="layouts-container">

        <!-- Layout 5 -->
        <div class="layout-wrapper">
            <h2>Макет 5</h2>
            <div class="bento-grid grid-5">
                <div class="bento-item item-1"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-1" alt="green cube 5-1"></div>
                <div class="bento-item item-2"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-2" alt="green cube 5-2"></div>
                <div class="bento-item item-3"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-3" alt="green cube 5-3"></div>
                <div class="bento-item item-4"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-4" alt="green cube 5-4"></div>
                <div class="bento-item item-5"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-5" alt="green cube 5-5"></div>
            </div>
        </div>

        <!-- Layout 4 -->
        <div class="layout-wrapper">
            <h2>Макет 4</h2>
            <div class="bento-grid grid-4">

                <div class="bento-item item-4"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-1" alt="green cube 4-4"></div>
                <div class="bento-item item-5"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-5" alt="green cube 4-5"></div>
                <div class="bento-item item-6"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-6" alt="green cube 4-6"></div>

        </div>

                <div class="bento-item item-2"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-4" alt="green cube 3-2"></div>

            <div class="bento-grid grid-2">

            <div class="bento-grid grid-1">
                <div class="bento-item item-1"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-1" alt="green cube 1-1"></div>
                <div class="bento-item item-2"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-4" alt="green cube 1-2"></div>

                <div class="bento-item item-5"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" class="shade-5" alt="green cube 1-5"></div>

</html>
